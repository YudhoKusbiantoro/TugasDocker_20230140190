<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input - Yudho Kusbiantoro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-attachment: fixed;
            color: #fff;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        .shape {
            position: fixed;
            filter: blur(100px);
            z-index: -1;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: #8e2de2;
            top: -100px;
            right: -100px;
            border-radius: 50%;
        }
        .shape-2 {
            width: 500px;
            height: 500px;
            background: #4a00e0;
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 40px 50px;
            width: 100%;
            max-width: 600px;
            z-index: 1;
        }
        
        .header {
            margin-bottom: 35px;
            text-align: center;
        }
        .header h2 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
        }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }
        .input-group input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-group input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00c6ff;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.3);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            padding-left: 30px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
        }
        .radio-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }
        .checkmark {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 20px;
            width: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .radio-option:hover input ~ .checkmark {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .radio-option input:checked ~ .checkmark {
            background-color: transparent;
            border-color: #00c6ff;
        }
        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }
        .radio-option input:checked ~ .checkmark:after {
            display: block;
        }
        .radio-option .checkmark:after {
            top: 4px;
            left: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00c6ff;
            box-shadow: 0 0 10px #00c6ff;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }
        .btn-submit {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
        }
        .btn-back {
            flex: 1;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="form-card">
        <div class="header">
            <h2>Input Data Mahasiswa</h2>
            <p>Silakan isi detail mahasiswa baru di bawah ini</p>
        </div>

        <form th:action="@{/submitForm}" th:object="${user}" method="post">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" th:field="*{nama}" placeholder="Masukkan Nama Lengkap" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Nomor Induk Mahasiswa (NIM)</label>
                <input type="text" th:field="*{nim}" placeholder="Masukkan NIM" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Jenis Kelamin</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" required>
                        <span class="checkmark"></span>
                        Laki-laki
                    </label>
                    <label class="radio-option">
                        <input type="radio" th:field="*{jenisKelamin}" value="Perempuan">
                        <span class="checkmark"></span>
                        Perempuan
                    </label>
                </div>
            </div>
            
            <div class="actions">
                <a href="/home" class="btn-back">Kembali</a>
                <button type="submit" class="btn-submit">Simpan Data</button>
            </div>
        </form>
        
        <div class="footer">
            Design by Yudho Kusbiantoro (20230140190)
        </div>
    </div>
</body>
</html>
